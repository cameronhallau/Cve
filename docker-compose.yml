services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cve_service
      POSTGRES_USER: cve
      POSTGRES_PASSWORD: cve
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cve -d cve_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  queue-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "56379:6379"

volumes:
  postgres-data:
